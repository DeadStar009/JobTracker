{% extends "base.html" %}

{% block title %}New Entry | JOB_TRACKER_V1.0{% endblock %}

{% block content %}
<section class="page">
    <header class="page-header">
        <h1>New Entry</h1>
        <div class="page-actions">
            <a class="button button-secondary" href="{{ url_for('applications') }}">BACK_TO_LIST</a>
        </div>
    </header>

    <div class="terminal-card">
        <div class="terminal-header">
            <div class="terminal-dots">
                <span class="dot dot-red"></span>
                <span class="dot dot-yellow"></span>
                <span class="dot dot-green"></span>
            </div>
            <div class="terminal-title">[ USER@LOCAL: ADD_JOB ]</div>
            <div class="terminal-meta">TTY1</div>
        </div>
        <form class="terminal-body" method="post" action="{{ url_for('entry') }}">
            <div class="terminal-message">
                <p>SYSTEM INITIALIZED. ENTERING DATA_ENTRY_MODE...</p>
                <p>TYPE 'HELP' FOR LIST OF COMMANDS OR FILL PARAMETERS BELOW.</p>
            </div>

            <div class="form-grid">
                <label class="form-field">
                    <span class="field-label">root@tracker:~/company$ <em>--required</em></span>
                    <input name="company" required placeholder="ENTER_ENTITY_NAME" />
                </label>
                <label class="form-field">
                    <span class="field-label">root@tracker:~/role$ <em>--required</em></span>
                    <input name="role" required placeholder="ENTER_POSITION_TITLE" />
                </label>
                <label class="form-field">
                    <span class="field-label">root@tracker:~/comp$</span>
                    <input name="salary" placeholder="EST_SALARY_RANGE" />
                </label>
                <label class="form-field">
                    <span class="field-label">root@tracker:~/location$</span>
                    <input name="location" placeholder="LOCATION_CITY_COUNTRY" />
                </label>
                <label class="form-field">
                    <span class="field-label">root@tracker:~/status$</span>
                    <select name="status">
                        {% for status in status_order %}
                        <option value="{{ status }}">{{ status }}</option>
                        {% endfor %}
                    </select>
                </label>
                <label class="form-field full">
                    <span class="field-label">root@tracker:~/metadata$</span>
                    <textarea name="notes" rows="4" placeholder="ATTACH_LINKS_OR_NOTES"></textarea>
                </label>
            </div>

            <div class="form-actions">
                <a class="button button-secondary" href="{{ url_for('applications') }}">CANCEL</a>
                <button class="button button-primary" type="submit">SAVE_ENTRY</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
